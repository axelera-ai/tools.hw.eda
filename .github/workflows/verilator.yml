name: Build and Upload Verilator

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: verilator

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: production-AWS-CPU-X86_64-EKS
            runner_labels: production-scale-set-x64-8-32
            arch: amd64
            label: ubuntu-20.04
            generic-os: linux
          - os: production-AWS-CPU-ARM64-EKS
            runner_labels: production-scale-set-arm64-8-16
            arch: arm64
            label: ubuntu-20.04
            generic-os: linux
          - os: macos-latest
            arch: arm64
            label: macos
            generic-os: osx
    env:
      CI_OS_NAME: ${{ matrix.generic-os }}

    runs-on:
      group: ${{ matrix.os }}
      labels: ${{ matrix.runner_labels }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.os == 'macos-latest'
        with:
            xcode-version: 'latest'

      - name: Set up Homebrew
        if: matrix.os == 'macos-latest'
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install packages for build
        if: ${{ contains(matrix.os, 'production-') }}
        working-directory: ${{ env.PKG_NAME }}
        run: |
          sudo apt-get update && \
          sudo apt-get install -y \
              build-essential \
              ccache help2man libfl-dev \
              libgoogle-perftools-dev \
              libsystemc libsystemc-dev \
              autoconf bison

      - name: Install packages for build
        if: matrix.os == 'macos-latest'
        working-directory: ${{ env.PKG_NAME }}
        run: |
          brew install ccache perl gperftools autoconf help2man bison

      - name: Build
        working-directory: ${{ env.PKG_NAME }}
        run: |
            if [ "$CI_OS_NAME" = "linux" ]; then
                NPROC=$(nproc)
            elif [ "$CI_OS_NAME" = "osx" ]; then
                NPROC=$(sysctl -n hw.logicalcpu)
            fi
            autoconf
            ./configure --prefix=`pwd`/install
            ccache -z
            make -j "$NPROC" -k
            make install

      - name: Sign and package
        uses: ./.github/actions/package
        if: ${{ inputs.release_version != '' }}
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
