name: Build and Upload Verilator

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: verilator
  CCACHE_DIR: /tmp/ccache

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_x86_64
            runs_on: ubuntu-latest
          - arch: arm64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_aarch64
            runs_on: ubuntu-24.04-arm
          - arch: arm64
            platform: macos
            label: macos
            container: ""
            runs_on: macos-latest

    runs-on: ${{ matrix.runs_on }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        if: ${{ matrix.label == 'macos' }}
        with:
            xcode-version: 'latest'

      - name: Set up Homebrew
        if: ${{ matrix.label == 'macos' }}
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install packages for build (Linux)
        if: ${{ matrix.container != '' }}
        run: |
          yum install -y \
              gcc-c++ make flex bison help2man \
              gperftools-devel autoconf perl ccache

      - name: Install packages for build (macOS)
        if: ${{ matrix.label == 'macos' }}
        working-directory: ${{ env.PKG_NAME }}
        run: |
          brew install ccache perl gperftools autoconf help2man bison

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-verilator-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('verilator/**') }}
          restore-keys: |
            ccache-verilator-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Build
        working-directory: ${{ env.PKG_NAME }}
        run: |
            if [ -f /etc/redhat-release ]; then
                NPROC=$(nproc)
            else
                NPROC=$(sysctl -n hw.logicalcpu)
            fi
            autoconf
            ./configure --prefix=$(pwd)/install
            ccache -z
            make -j "$NPROC" -k CXX="ccache g++" CC="ccache gcc"
            make install

      - name: Verify linking
        working-directory: ${{ env.PKG_NAME }}
        run: |
            if [ -f /etc/redhat-release ]; then
              echo "=== ldd output ==="
              ldd install/bin/verilator_bin || true
            else
              echo "=== otool -L output ==="
              otool -L install/bin/verilator_bin || true
            fi

      - name: Print ccache stats
        if: always()
        run: ccache -s

      - name: Sign and package
        uses: ./.github/actions/package
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
