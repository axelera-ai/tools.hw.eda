name: Build Tools and Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release Version
        default: ''
        required: false
        type: string

  pull_request:
    branches:
      - main

env:
  APPLE_ID_NAME: Florian Zaruba
  APPLE_TEAM_ID: 4LZSA9ML57
  APPLE_ID: florian@zaruba.email

jobs:
  # Only if this was manually triggered
  create-release:
    name: Create new release
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    outputs:
      release_version: ${{ steps.release_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
      - name: Release version
        id: release_tag
        run: |
          tag=$(date +%Y_%m_%d)
          if [ -n "${{ github.event.inputs.release_version }}" ]; then \
            tag=${{ github.event.inputs.release_version }}
          fi
          echo "tag=${tag}" >> $GITHUB_OUTPUT

      - name: Create new release
        run: |
          gh release create ${{ steps.release_tag.outputs.tag }} --target ${{ github.sha }} \
            --title "EDA Tool Release ${{ steps.release_tag.outputs.tag }}" \
            --notes "Various binaries for EDA tools." \
            --generate-notes
        env:
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-submodule:
    name: Check for changes
    runs-on: ubuntu-latest
    needs: create-release
    if: ${{ always() }}
    outputs:
      build_slang: ${{ steps.check_submodules.outputs.build_slang }}  # Default to false if not set
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Check for submodule changes
        id: check_submodules
        run: |
          SUBMODULE_PATH="slang"
          # Fetch the latest commit from the main branch
          git fetch origin main
          BASE_SHA=$(git ls-tree origin/main @ $SUBMODULE_PATH | awk '{ print $3 }')
          CURRENT_SHA=$(git ls-tree HEAD @ $SUBMODULE_PATH | awk '{ print $3 }')
          echo "Base SHA on main branch: $BASE_SHA"
          echo "Current SHA: $CURRENT_SHA"

          if [ "$BASE_SHA" != "$CURRENT_SHA" ]; then
            echo "Submodule SHA has changed"
            echo "build_slang=true" >> $GITHUB_OUTPUT
          else
            echo "Submodule SHA has not changed"
            echo "build_slang=false" >> $GITHUB_OUTPUT
          fi

  build-and-upload-slang:
    name: Build (and upload) `slang`
    uses: ./.github/workflows/slang.yml
    needs: [check-submodule, create-release]
    if: ${{ (always() && needs.check-submodule.outputs.build_slang == 'true') || github.event_name != 'pull_request' }}
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
