name: Build Tools and Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release Version
        default: ''
        required: false
        type: string

  pull_request:
    branches:
      - main

jobs:
  # Only if this was manually triggered
  create-release:
    name: Create new release
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    outputs:
      release_version: ${{ steps.release_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: false
      - name: Release version
        id: release_tag
        run: |
          tag=$(date +%Y_%m_%d)
          if [ -n "${{ github.event.inputs.release_version }}" ]; then \
            tag=${{ github.event.inputs.release_version }}
          fi
          echo "tag=${tag}" >> $GITHUB_OUTPUT

      - name: Create new release
        run: |
          gh release create ${{ steps.release_tag.outputs.tag }} --target ${{ github.sha }} \
            --title "EDA Tool Release ${{ steps.release_tag.outputs.tag }}" \
            --notes "Various binaries for EDA tools." \
            --generate-notes
        env:
         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-submodule:
    name: Check for changes
    runs-on: ubuntu-latest
    needs: create-release
    if: ${{ always() }}
    outputs:
      build_slang: ${{ steps.check_submodule_slang.outputs.build }}
      build_verilator: ${{ steps.check_submodule_verilator.outputs.build }}
      build_yosys: ${{ steps.check_submodule_yosys.outputs.build }}
      build_opensta: ${{ steps.check_submodule_opensta.outputs.build }}
      build_abc: ${{ steps.check_submodule_abc.outputs.build }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Check for submodule changes (slang)
        id: check_submodule_slang
        run: |
          ./ci/check_submodule_change.sh slang
      - name: Check for submodule changes (verilator)
        id: check_submodule_verilator
        run: |
          ./ci/check_submodule_change.sh verilator
      - name: Check for submodule changes (yosys)
        id: check_submodule_yosys
        run: |
          # Check both yosys and yosys-slang; rebuild if either changed
          YOSYS_SHA_BASE=$(git ls-tree origin/main @ yosys | awk '{ print $3 }')
          YOSYS_SHA_HEAD=$(git ls-tree HEAD @ yosys | awk '{ print $3 }')
          SLANG_SHA_BASE=$(git ls-tree origin/main @ yosys-slang | awk '{ print $3 }')
          SLANG_SHA_HEAD=$(git ls-tree HEAD @ yosys-slang | awk '{ print $3 }')
          if [ "$YOSYS_SHA_BASE" != "$YOSYS_SHA_HEAD" ] || [ "$SLANG_SHA_BASE" != "$SLANG_SHA_HEAD" ]; then
            echo "Yosys or yosys-slang submodule changed"
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes in yosys or yosys-slang"
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check for submodule changes (opensta)
        id: check_submodule_opensta
        run: |
          ./ci/check_submodule_change.sh opensta
      - name: Check for submodule changes (abc)
        id: check_submodule_abc
        run: |
          ./ci/check_submodule_change.sh abc

  build-and-upload-slang:
    name: Build (and upload) `slang`
    uses: ./.github/workflows/slang.yml
    needs: [check-submodule, create-release]
    if: >-
      ${{
        always() &&
        (needs.check-submodule.outputs.build_slang == 'true' || github.event_name != 'pull_request')
      }}
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}

  build-and-upload-verilator:
    name: Build (and upload) `verilator`
    uses: ./.github/workflows/verilator.yml
    needs: [check-submodule, create-release]
    if: >-
      ${{
        always() &&
        (needs.check-submodule.outputs.build_verilator == 'true' || github.event_name != 'pull_request')
      }}
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}

  build-and-upload-yosys:
    name: Build (and upload) `yosys`
    uses: ./.github/workflows/yosys.yml
    needs: [check-submodule, create-release]
    if: >-
      ${{
        always() &&
        (needs.check-submodule.outputs.build_yosys == 'true' || github.event_name != 'pull_request')
      }}
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}

  build-and-upload-opensta:
    name: Build (and upload) `opensta`
    uses: ./.github/workflows/opensta.yml
    needs: [check-submodule, create-release]
    if: >-
      ${{
        always() &&
        (needs.check-submodule.outputs.build_opensta == 'true' || github.event_name != 'pull_request')
      }}
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}

  build-and-upload-abc:
    name: Build (and upload) `abc`
    uses: ./.github/workflows/abc.yml
    needs: [check-submodule, create-release]
    if: >-
      ${{
        always() &&
        (needs.check-submodule.outputs.build_abc == 'true' || github.event_name != 'pull_request')
      }}
    with:
      release_version: ${{ needs.create-release.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_CERT_DATA: ${{ secrets.APPLE_CERT_DATA }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
