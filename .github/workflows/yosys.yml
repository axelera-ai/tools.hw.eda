name: Build and Upload Yosys

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: yosys
  CCACHE_DIR: /tmp/ccache

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_x86_64
            runs_on: '{"group":"production-AWS-CPU-X86_64-EKS","labels":"production-scale-set-x64-8-32"}'
          - arch: arm64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_aarch64
            runs_on: '{"group":"production-AWS-CPU-ARM64-EKS","labels":"production-scale-set-arm64-8-16"}'
          - arch: arm64
            platform: macos
            label: macos
            container: ""
            runs_on: '"macos-15"'

    runs-on: ${{ fromJSON(matrix.runs_on) }}
    container: ${{ matrix.container || null }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: ${{ matrix.container != '' }}
        run: |
          yum install -y \
            gperf flex gawk git pkgconfig zlib-devel zlib-static \
            clang gcc-toolset-12-gcc-c++ make wget m4 ccache
          # yosys v0.63+ requires bison >= 3.6, AlmaLinux 8 ships 3.0.4
          curl -sL https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.gz | tar xz
          cd bison-3.8.2 && ./configure --prefix=/usr/local && make -j$(nproc) && make install && cd ..
          rm -rf bison-3.8.2

      - uses: maxim-lobanov/setup-xcode@v1
        if: ${{ matrix.label == 'macos' }}
        with:
          xcode-version: ^16.0.0

      - name: Set up Homebrew
        if: ${{ matrix.label == 'macos' }}
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install packages for build (macOS)
        if: ${{ matrix.label == 'macos' }}
        run: |
          brew install bison flex gawk bash autoconf ccache

      - name: Restore ccache
        uses: actions/cache@v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-yosys-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('yosys/**', 'yosys-slang/**') }}
          restore-keys: |
            ccache-yosys-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure
        working-directory: ${{ env.PKG_NAME }}
        run: |
            git submodule update --init --recursive
            make config-clang ENABLE_TCL=0 ENABLE_READLINE=0 ENABLE_PLUGINS=0

      - name: Build yosys
        working-directory: ${{ env.PKG_NAME }}
        run: |
            if [ -f /etc/redhat-release ]; then
              NPROC=$(nproc)
            else
              NPROC=$(sysctl -n hw.logicalcpu)
            fi
            make -j "$NPROC" ENABLE_TCL=0 ENABLE_READLINE=0 ENABLE_PLUGINS=0 ENABLE_CCACHE=1

      - name: Build yosys-slang (static)
        working-directory: yosys-slang
        run: |
          git submodule update --init --recursive
          YOSYS_INCLUDE=$(pwd)/../yosys/install/share/yosys/include
          # Build as static library first so we have yosys-config available
          make install ENABLE_TCL=0 ENABLE_READLINE=0 ENABLE_PLUGINS=0 PREFIX=$(pwd)/../yosys/install -C ../yosys
          cmake -S . -B build \
            -DYOSYS_CONFIG=$(pwd)/../yosys/install/bin/yosys-config \
            -DBUILD_AS_PLUGIN=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_FLAGS="-I${YOSYS_INCLUDE}"
          if [ -f /etc/redhat-release ]; then
            NPROC=$(nproc)
          else
            NPROC=$(sysctl -n hw.logicalcpu)
          fi
          cmake --build build -j"$NPROC"

      - name: Re-link yosys with yosys-slang built-in
        working-directory: ${{ env.PKG_NAME }}
        run: |
            SLANG_BUILD=$(pwd)/../yosys-slang/build
            YOSYS_SLANG_LIB=$(find ${SLANG_BUILD} -name 'libyosys-slang.a' | head -1)
            SVLANG_LIB=$(find ${SLANG_BUILD} -name 'libsvlang.a' | head -1)
            FMT_LIB=$(find ${SLANG_BUILD} -name 'libfmt.a' | head -1)
            echo "Found libs: ${YOSYS_SLANG_LIB} ${SVLANG_LIB} ${FMT_LIB}"
            if [ -f /etc/redhat-release ]; then
              FORCE_LOAD="-Wl,--whole-archive ${YOSYS_SLANG_LIB} -Wl,--no-whole-archive"
            else
              FORCE_LOAD="-Wl,-force_load,${YOSYS_SLANG_LIB}"
            fi
            rm -f yosys
            make ENABLE_TCL=0 ENABLE_READLINE=0 ENABLE_PLUGINS=0 ENABLE_CCACHE=1 \
              EXE_LIBS="${FORCE_LOAD} ${SVLANG_LIB} ${FMT_LIB}"
            make install ENABLE_TCL=0 ENABLE_READLINE=0 ENABLE_PLUGINS=0 PREFIX=$(pwd)/install

      - name: Verify build
        working-directory: ${{ env.PKG_NAME }}
        run: |
            echo "=== Checking read_slang command ==="
            install/bin/yosys -H | grep read_slang
            echo "=== Checking dynamic linking ==="
            if [ -f /etc/redhat-release ]; then
              ldd install/bin/yosys || true
            else
              otool -L install/bin/yosys || true
            fi

      - name: Print ccache stats
        if: always()
        run: ccache -s

      - name: Sign and package
        uses: ./.github/actions/package
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
