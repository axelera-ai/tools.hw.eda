name: Build and Upload OpenSTA

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: opensta
  CCACHE_DIR: /tmp/ccache

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_x86_64
            runs_on: '{"group":"production-AWS-CPU-X86_64-EKS","labels":"production-scale-set-x64-8-32"}'
          - arch: arm64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_aarch64
            runs_on: '{"group":"production-AWS-CPU-ARM64-EKS","labels":"production-scale-set-arm64-8-16"}'
          - arch: arm64
            platform: macos
            label: macos
            container: ""
            runs_on: '"macos-15"'

    runs-on: ${{ fromJSON(matrix.runs_on) }}
    container: ${{ matrix.container || null }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: ${{ matrix.container != '' }}
        run: |
          yum install -y \
            gcc-c++ make cmake3 flex swig tcl-devel zlib-devel \
            pcre-devel wget m4 ccache
          alternatives --install /usr/bin/cmake cmake /usr/bin/cmake3 100 || true
          # Bison >= 3.2 required, AlmaLinux 8 ships 3.0.4
          curl -sL https://ftp.gnu.org/gnu/bison/bison-3.8.2.tar.gz | tar xz
          cd bison-3.8.2 && ./configure --prefix=/usr/local && make -j$(nproc) && make install && cd ..
          rm -rf bison-3.8.2
          # Build static TCL for portable binary
          curl -sL https://prdownloads.sourceforge.net/tcl/tcl8.6.16-src.tar.gz | tar xz
          cd tcl8.6.16/unix && ./configure --prefix=/usr/local --disable-shared && make -j$(nproc) && make install && cd ../..
          rm -rf tcl8.6.16

      - uses: maxim-lobanov/setup-xcode@v1
        if: ${{ matrix.label == 'macos' }}
        with:
          xcode-version: ^16.0.0

      - name: Set up Homebrew
        if: ${{ matrix.label == 'macos' }}
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Install packages for build (macOS)
        if: ${{ matrix.label == 'macos' }}
        run: |
          brew install bison flex swig ccache
          brew install tcl-tk@8 2>/dev/null || true

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-opensta-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('opensta/**') }}
          restore-keys: |
            ccache-opensta-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure
        working-directory: ${{ env.PKG_NAME }}
        run: |
            mkdir -p build && cd build
            # SWIG 4.4+ removed $function in favor of $action
            sed -i.bak 's/\$function/$action/g' ../tcl/Exception.i
            # SWIG 4.x is not recognized as >= 3.0 by CMake 4.x's FindSWIG
            sed -i.bak 's/find_package(SWIG REQUIRED 3\.0)/find_package(SWIG REQUIRED)/' ../CMakeLists.txt
            if [ -f /etc/redhat-release ]; then
              cmake .. \
                -DCMAKE_INSTALL_PREFIX=$(pwd)/../install \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DTCL_LIBRARY=/usr/local/lib/libtcl8.6.a \
                -DTCL_INCLUDE_PATH=/usr/local/include \
                -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc -ldl -lm -lpthread"
            else
              TCL_PREFIX=$(brew --prefix tcl-tk@8)
              BISON_PREFIX=$(brew --prefix bison)
              cmake .. \
                -DCMAKE_INSTALL_PREFIX=$(pwd)/../install \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DTCL_LIBRARY=${TCL_PREFIX}/lib/libtcl8.6.dylib \
                -DTCL_INCLUDE_PATH=${TCL_PREFIX}/include \
                -DBISON_EXECUTABLE=${BISON_PREFIX}/bin/bison
            fi

      - name: Build
        working-directory: ${{ env.PKG_NAME }}/build
        run: |
            if [ -f /etc/redhat-release ]; then
              NPROC=$(nproc)
            else
              NPROC=$(sysctl -n hw.logicalcpu)
            fi
            cmake --build . -j"$NPROC"
            cmake --install .

      - name: Verify build
        working-directory: ${{ env.PKG_NAME }}
        run: |
            echo "=== sta version ==="
            install/bin/sta -version || install/bin/sta -help || true
            echo "=== Checking dynamic linking ==="
            if [ -f /etc/redhat-release ]; then
              ldd install/bin/sta || true
            else
              otool -L install/bin/sta || true
            fi

      - name: Print ccache stats
        if: always()
        run: ccache -s

      - name: Sign and package
        uses: ./.github/actions/package
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
