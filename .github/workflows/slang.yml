name: Build and Upload Slang

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: slang

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: gcc-11-release
            os: production-AWS-CPU-X86_64-EKS
            runner_labels: production-scale-set-x64-8-32
            arch: amd64
            label: ubuntu-20.04
          - preset: gcc-11-release
            os: production-AWS-CPU-ARM64-EKS
            runner_labels: production-scale-set-arm64-8-16
            arch: arm64
            label: ubuntu-20.04
          - preset: macos-release
            os: macos-latest
            arch: arm64
            label: macos

    runs-on:
      group: ${{ matrix.os }}
      labels: ${{ matrix.runner_labels }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0
      
      - name: Install dependencies
        if: ${{ contains(matrix.os, 'production-') }}
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-18 main"
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-key adv --fetch-keys https://apt.kitware.com/keys/kitware-archive-latest.asc
          DISTRO_CODENAME=$(lsb_release -cs)
          sudo apt-add-repository "deb https://apt.kitware.com/ubuntu/ $DISTRO_CODENAME main"
          sudo apt-get update && \
          sudo apt-get install -y \
              build-essential \
              g++-13 g++-11 clang-18 clang-tidy-18 \
              cmake

      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.os == 'macos-latest'
        with:
          xcode-version: ^16.0.0

      - name: Configure
        working-directory: ${{ env.PKG_NAME }}
        run: |
            cmake --preset ${{ matrix.preset }} \
              -DSLANG_CI_BUILD=ON \
              -DCMAKE_INSTALL_PREFIX=`pwd`/install

      - name: Build
        working-directory: ${{ env.PKG_NAME }}
        run: cmake --build build/${{ matrix.preset }} --target install -j8

      - name: Run tests
        working-directory: ${{ env.PKG_NAME }}
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --no-tests=error -j8

      - name: Sign and package
        uses: ./.github/actions/package
        if: ${{ inputs.release_version != '' }}
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
