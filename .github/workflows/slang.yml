name: Build and Upload Slang

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: slang
  CCACHE_DIR: /tmp/ccache

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: gcc-release
            arch: amd64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_x86_64
            runs_on: external-runner-8-32-x86
          - preset: gcc-release
            arch: arm64
            platform: linux
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_aarch64
            runs_on: external-runner-8-32-arm64
          - preset: macos-release
            arch: arm64
            platform: macos
            label: macos
            container: ""
            runs_on: '"macos-latest"'

    runs-on:
      group: ci-external-repo
      labels: ${{ matrix.runs_on }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: ${{ matrix.container != '' }}
        run: |
          yum install -y gcc-toolset-13-gcc-c++ cmake3 make ccache
          # Ensure cmake3 is available as cmake
          alternatives --install /usr/bin/cmake cmake /usr/bin/cmake3 100 || true
          # Make gcc-toolset-13 compilers available in PATH
          ln -sf /opt/rh/gcc-toolset-13/root/usr/bin/g++ /usr/local/bin/g++
          ln -sf /opt/rh/gcc-toolset-13/root/usr/bin/gcc /usr/local/bin/gcc

      - uses: maxim-lobanov/setup-xcode@v1
        if: ${{ matrix.label == 'macos' }}
        with:
          xcode-version: ^16.0.0

      - name: Install ccache (macOS)
        if: ${{ matrix.label == 'macos' }}
        run: brew install ccache

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-slang-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('slang/**') }}
          restore-keys: |
            ccache-slang-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --set-config=compression=true
          ccache -z

      - name: Configure
        working-directory: ${{ env.PKG_NAME }}
        run: |
            cmake --preset ${{ matrix.preset }} \
              -DSLANG_CI_BUILD=ON \
              -DCMAKE_INSTALL_PREFIX=$(pwd)/install \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER=g++ \
              -DCMAKE_C_COMPILER=gcc

      - name: Build
        working-directory: ${{ env.PKG_NAME }}
        run: cmake --build build/${{ matrix.preset }} --target install -j8

      - name: Run tests
        working-directory: ${{ env.PKG_NAME }}
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --no-tests=error -j8

      - name: Verify linking
        working-directory: ${{ env.PKG_NAME }}
        run: |
            if [ -f /etc/redhat-release ]; then
              echo "=== ldd output ==="
              ldd install/bin/slang || true
            else
              echo "=== otool -L output ==="
              otool -L install/bin/slang || true
            fi

      - name: Print ccache stats
        if: always()
        run: ccache -s

      - name: Sign and package
        uses: ./.github/actions/package
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
