name: Build and Upload Slang

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: slang
  APPLE_ID_NAME: Florian Zaruba
  APPLE_TEAM_ID: 4LZSA9ML57
  APPLE_ID: florian@zaruba.email
  WORKING_DIR: slang

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: gcc-11-release
            os: ci-prod-AWS-CPU-X86_64-EKS
            arch: amd64
            label: ubuntu-20.04
          - preset: gcc-11-release
            os: ci-prod-AWS-CPU-ARM64-EKS
            arch: arm64
            label: ubuntu-20.04
          - preset: macos-release
            os: macos-latest
            arch: arm64
            label: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
          fetch-depth: 0
      - name: Install dependencies

        if: ${{ contains(matrix.os, 'ci-prod-') }}
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/focal/ llvm-toolchain-focal-18 main"
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          (type -p wget >/dev/null || (sudo apt update && sudo apt-get install wget -y)) \
            && sudo mkdir -p -m 755 /etc/apt/keyrings \
            && wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
            && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
            && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-key adv --fetch-keys https://apt.kitware.com/keys/kitware-archive-latest.asc
          DISTRO_CODENAME=$(lsb_release -cs)
          sudo apt-add-repository "deb https://apt.kitware.com/ubuntu/ $DISTRO_CODENAME main"
          sudo apt-get update && \
          sudo apt-get install -y \
              build-essential \
              g++-13 g++-11 clang-18 clang-tidy-18 \
              gh \
              cmake

      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.os == 'macos-latest'
        with:
          xcode-version: 'latest'

      - name: Configure
        working-directory: ${{ env.WORKING_DIR }}
        run: cmake --preset ${{ matrix.preset }} -DSLANG_CI_BUILD=ON

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: cmake --build build/${{ matrix.preset }} --target install -j8

      - name: Run tests
        working-directory: ${{ env.WORKING_DIR }}
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --no-tests=error -j8

      - name: Install certificate
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERT_DATA }}
          p12-password: ${{ secrets.APPLE_CERT_PASSWORD }}

      - name: Sign the build
        if: matrix.os == 'macos-latest'
        working-directory: ${{ env.WORKING_DIR }}
        run: |
            codesign                                                                       \
              --timestamp                                                                  \
              --options=runtime                                                            \
              --force --verify --verbose                                                   \
              --sign "Developer ID Application: ${{ env. APPLE_ID_NAME }} (${{ env.APPLE_TEAM_ID }})" \
              install/${{ matrix.preset }}/bin/slang*
            ditto -c -k --keepParent install/${{ matrix.preset }} ${{ env.PKG_NAME }}.zip
            xcrun notarytool submit ${{ env.PKG_NAME }}.zip           \
                    --apple-id ${{ env.APPLE_ID }}                    \
                    --password "${{ secrets.APPLE_NOTARY_PASSWORD }}" \
                    --team-id  ${{ env.APPLE_TEAM_ID }}               \
                    --wait

      - name: Re-name and archive the build directory
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          ARCHIVE_NAME="${{ env.PKG_NAME }}-${{ matrix.arch }}-${{ matrix.label }}"
          mv install/${{ matrix.preset }} ${{ env.PKG_NAME }}
          tar -czf "$ARCHIVE_NAME.tar.gz" ${{ env.PKG_NAME }}

      - name: Upload (.tar.gz) to release
        if: ${{ inputs.release_version != '' }}
        run: |
          gh release upload ${{ inputs.release_version }} \
           ${{ env.WORKING_DIR }}/${{ env.PKG_NAME }}-${{ matrix.arch }}-${{ matrix.label }}.tar.gz --clobber
        env:
            GH_TOKEN: ${{ secrets.GH_TOKEN }}
