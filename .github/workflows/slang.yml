name: Build and Upload Slang

on:
  workflow_call:
    inputs:
      release_version:
        description: "Release Version"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        description: "Github token for release"
      APPLE_CERT_DATA:
        description: "API key for deployment"
      APPLE_CERT_PASSWORD:
        description: "Access token for secure operations"
      APPLE_NOTARY_PASSWORD:
        description: "App specific notary password"

env:
  PKG_NAME: slang

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: gcc-11-release
            os: production-AWS-CPU-X86_64-EKS
            runner_labels: production-scale-set-x64-8-32
            arch: amd64
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_x86_64
          - preset: gcc-11-release
            os: production-AWS-CPU-ARM64-EKS
            runner_labels: production-scale-set-arm64-8-16
            arch: arm64
            label: manylinux_2_28
            container: quay.io/pypa/manylinux_2_28_aarch64
          - preset: macos-release
            os: macos-latest
            arch: arm64
            label: macos
            container: ""

    runs-on:
      group: ${{ matrix.os }}
      labels: ${{ matrix.runner_labels }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: ${{ matrix.container != '' }}
        run: |
          yum install -y gcc-toolset-11-gcc-c++ cmake3 make
          # Ensure cmake3 is available as cmake
          alternatives --install /usr/bin/cmake cmake /usr/bin/cmake3 100 || true

      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.os == 'macos-latest'
        with:
          xcode-version: ^16.0.0

      - name: Configure
        working-directory: ${{ env.PKG_NAME }}
        run: |
            cmake --preset ${{ matrix.preset }} \
              -DSLANG_CI_BUILD=ON \
              -DCMAKE_INSTALL_PREFIX=$(pwd)/install

      - name: Build
        working-directory: ${{ env.PKG_NAME }}
        run: cmake --build build/${{ matrix.preset }} --target install -j8

      - name: Run tests
        working-directory: ${{ env.PKG_NAME }}
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --no-tests=error -j8

      - name: Verify linking
        working-directory: ${{ env.PKG_NAME }}
        run: |
            if [ -f /etc/redhat-release ]; then
              echo "=== ldd output ==="
              ldd install/bin/slang || true
            else
              echo "=== otool -L output ==="
              otool -L install/bin/slang || true
            fi

      - name: Sign and package
        uses: ./.github/actions/package
        if: ${{ inputs.release_version != '' }}
        with:
            working_directory: ${{ env.PKG_NAME }}
            pkg_name: ${{ env.PKG_NAME }}
            matrix_arch: ${{ matrix.arch }}
            matrix_label: ${{ matrix.label }}
            release_version: ${{ inputs.release_version }}
            apple_cert_data: ${{ secrets.APPLE_CERT_DATA }}
            apple_cert_password: ${{ secrets.APPLE_CERT_PASSWORD }}
            apple_notary_password: ${{ secrets.APPLE_NOTARY_PASSWORD }}
            gh_token: ${{ secrets.GH_TOKEN  }}
